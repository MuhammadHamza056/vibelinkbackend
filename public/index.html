<!doctype html>

    <title>VibeLink API</title>
    <style>
      body {
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
        background: #0f1020;
        color: #e7e7f0;
        display: flex;
        min-height: 100vh;
        margin: 0;
        align-items: center;
        justify-content: center;

        margin-top: 1.25rem;
        padding: 0.6rem 1.4rem;
        background: #5b5bff;
        color: #fff;
        text-decoration: none;
        border-radius: 8px;

  <body>
    <div class="card">
      <h1>VibeLink API</h1>
      <p>The backend is running.</p>
